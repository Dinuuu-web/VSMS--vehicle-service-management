{% extends "base.html" %}

{% block title %}New Job Card | GMS{% endblock %}
{% block page_title %}INITIALIZE WORK ORDER{% endblock %}

{% block content %}
<div class="panel-metal" style="max-width:600px; margin:0 auto;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div style="display:grid; grid-template-columns:1fr; gap:20px;">
            
            <div class="form-group">
                <label><i class="fas fa-car text-gold"></i> TARGET VEHICLE *</label>
                <select name="vehicle_id" class="input-engraved" required>
                    <option value="">-- SELECT VEHICLE --</option>
                    {% for v in vehicles %}
                    <option value="{{ v.id }}" {% if selected_vehicle|string == v.id|string %}selected{% endif %}>
                        {{ v.license_plate }} - {{ v.make }} {{ v.model }} (CST: {{ v.customer.name }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user-cog text-gold"></i> ASSIGN MECHANIC</label>
                <select name="mechanic_id" class="input-engraved">
                    <option value="">-- UNASSIGNED --</option>
                    {% for m in mechanics %}
                    <option value="{{ m.id }}">OPRT-{{ "%03d" | format(m.id) }} | {{ m.username }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clipboard-list text-gold"></i> INITIAL DIAGNOSTIC NOTES / SYMPTOMS</label>
                <textarea name="notes" class="input-engraved" rows="4" placeholder="Describe customer complaints..."></textarea>
            </div>
            
        </div>
        
        <div style="margin-top:25px; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:20px;">
            <a href="{{ url_for('jobs.kanban') }}" class="btn-metal" style="color:var(--color-text-muted);"><i class="fas fa-times"></i> ABORT</a>
            <button type="submit" class="btn-metal" style="color:var(--color-green-ok); border-color:var(--color-green-ok);">
                <i class="fas fa-file-signature"></i> GENERATE JOB CARD
            </button>
        </div>
    </form>
</div>
{% endblock %}
