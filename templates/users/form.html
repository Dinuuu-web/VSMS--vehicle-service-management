{% extends "base.html" %}

{% block title %}Add Operator | GMS{% endblock %}
{% block page_title %}INITIALIZE NEW OPERATOR{% endblock %}

{% block content %}
<div class="panel-metal" style="max-width:500px; margin:0 auto;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div style="display:grid; grid-template-columns:1fr; gap:20px;">
            <div class="form-group">
                <label><i class="fas fa-user-ninja text-gold"></i> CALLSIGN (USERNAME) *</label>
                <input type="text" name="username" class="input-engraved" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope text-gold"></i> CONTACT EMAIL *</label>
                <input type="email" name="email" class="input-engraved" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-id-badge text-gold"></i> CLEARANCE LEVEL (ROLE) *</label>
                <select name="role" class="input-engraved" required>
                    <option value="Mechanic">Mechanic (Standard Ops)</option>
                    <option value="Receptionist">Receptionist (Front Desk)</option>
                    <option value="Admin">System Admin (Full Access)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-key text-gold"></i> ASSIGN SECURE PASSWORD *</label>
                <input type="password" name="password" class="input-engraved" required>
            </div>
        </div>
        
        <div style="margin-top:25px; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:20px;">
            <a href="{{ url_for('users.list_users') }}" class="btn-metal" style="color:var(--color-text-muted);"><i class="fas fa-times"></i> CANCEL</a>
            <button type="submit" class="btn-metal" style="color:var(--color-green-ok); border-color:var(--color-green-ok);">
                <i class="fas fa-user-plus"></i> PROVISION RECORD
            </button>
        </div>
    </form>
</div>
{% endblock %}
