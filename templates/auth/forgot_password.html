<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - VSMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=Poppins:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

    <div id="toast-container" class="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="toast {{ category }}">
                    <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' if category == 'error' else 'info-circle' }}" style="margin-right:10px;"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="auth-bg">
      <div class="particles-container"></div>
      
      <div class="auth-card fade-in stagger-1">
        <div class="auth-logo" style="margin-bottom: 20px;">
          <h2>RECOVERY</h2>
          <div style="display:flex; justify-content:center; gap:5px; margin-top:10px;">
              <div style="width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 5px var(--accent);"></div>
              <div style="width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2);"></div>
              <div style="width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2);"></div>
          </div>
          <p style="margin-top:10px;">STEP 1: IDENTIFY ACCOUNT</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div>
            <label style="font-family:'Inter', sans-serif; font-weight: 600; color:var(--text-muted); font-size:0.8rem;">USERNAME</label>
            <div style="position:relative; margin-bottom:25px;">
                <i class="fas fa-user border-color" style="position:absolute; left:15px; top:12px; color:var(--text-muted);"></i>
                <input type="text" name="username" class="input-engraved" style="padding-left:45px;" required placeholder="Enter your username">
            </div>
          </div>
          
          <button type="submit" class="btn-metal" style="width:100%; font-size:1.1rem; letter-spacing:2px; padding:12px;">CONTINUE</button>
        </form>
        
        <div class="auth-links" style="justify-content:center; margin-top:20px;">
          <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
      </div>
      
      <div style="position:absolute; bottom:20px; text-align:center; width:100%; font-family:'Inter', sans-serif; font-weight: 600; font-size:0.8rem; color:rgba(255,255,255,0.3);">
        © 2026 VSMS | Developed by Dinbandhu Choudhary & Aditya Hardas
      </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
